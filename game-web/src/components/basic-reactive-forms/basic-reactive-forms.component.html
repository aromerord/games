<form autocomplete="off" [formGroup]="form" (ngSubmit)="onSave()">

  <div class="mb-3 mt-3">
    <label class="form-label">Producto</label>
    <input type="text" class="form-control" placeholder="Nombre del producto" formControlName="name"/>
    <span class="form-text text-danger">
      <!-- Debe de ser de 3 letras -->
      error message
    </span>
  </div>

  <div class="row">
    <div class="col-md-6">
      <div class="mb-3">
        <label class="form-label">Precio</label>
        <input type="number" class="form-control" placeholder="Precio del producto" formControlName="price"/>
        <span class="form-text text-danger">
          El precio debe de ser 0 o mayor
        </span>
      </div>
    </div>
    <div class="col-md-6">
      <div class="mb-3">
        <label class="form-label">Existencias</label>
        <input type="number" class="form-control" placeholder="Existencias del producto" formControlName="inStorage"/>
        <span class="form-text text-danger">
          Las existencias deben de ser 0 o mayor
        </span>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col">
      <button type="submit" class="btn btn-primary float-end">
        Guardar
      </button>
    </div>
  </div>
</form>

<span>Valid</span>
<pre>{{ form.valid | json }}</pre>

<span>Pristine</span> <!-- Si el formulario se ha manipulado -->
<pre>{{ form.pristine | json }}</pre>

<span>Touched</span> <!-- Si el formulario se ha tocado -->
<pre>{{ form.touched | json }}</pre>

<span>Value</span>
<pre>{{ form.value | json }}</pre>
